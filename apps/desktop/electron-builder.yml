appId: app.flitdrop.desktop
productName: Flitdrop
directories:
  output: release
  buildResources: build
files:
  - main.cjs
  - core/**
  - public/**
  - build/icon.png
  - build/tray.png
# associe l'app à "Envoyer vers" et à "Ouvrir avec" pour tous les fichiers
fileAssociations:
  - ext: '*'
    name: Fichier
    role: Viewer
asar: true
win:
  target:
    - nsis
    - appx
  icon: build/icon.png
appx:
  # identityName et publisher sont remplacés par les valeurs du Partner Center
  # (Microsoft Store > Gestion des produits > Identité du package)
  identityName: PLACEHOLDER.Flitdrop
  publisher: CN=PLACEHOLDER
  publisherDisplayName: Flitdrop
  backgroundColor: '#1b1b1b'
  languages:
    - fr-FR
    - en-US
nsis:
  oneClick: true
  perMachine: false
  deleteAppDataOnUninstall: false
  license: ''
  # ajoute "clic-droit > Envoyer vers > Flitdrop" dans l'Explorateur Windows
  include: build/installer.nsh

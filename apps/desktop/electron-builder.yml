appId: app.flitdrop.desktop
productName: Flitdrop
# version explicite : evite l'erreur "Cannot compute electron version" quand
# electron-builder n'introspecte pas le node_modules hoiste du workspace.
electronVersion: 33.2.1
# le coeur est bundle en un seul .cjs (aucune dependance runtime npm), donc on
# desactive l'etape d'install/rebuild d'electron-builder : dans un monorepo elle
# elague les devDependencies hoistees et se supprime elle-meme (app-builder-bin).
npmRebuild: false
buildDependenciesFromSource: false
# signe l'app macOS en ad-hoc pour qu'elle ne soit pas vue comme « endommagée »
afterPack: build/afterPack.cjs
directories:
  output: release
  buildResources: build
files:
  - main.cjs
  - core/**
  - public/**
  - build/icon.png
  - build/icon.ico
  - build/tray.png
# associe l'app à "Envoyer vers" et à "Ouvrir avec" pour tous les fichiers
fileAssociations:
  - ext: '*'
    name: Fichier
    role: Viewer
asar: true
mac:
  target:
    - dmg
  icon: build/icon.png
  category: public.app-category.utilities
  # non signe : suffisant pour tester et pour un lancement GitHub. Pour une
  # distribution large, ajouter la signature + notarisation Apple.
  identity: null
dmg:
  title: Flitdrop ${version}
  background: build/background.png
  iconSize: 92
  window:
    width: 540
    height: 380
  contents:
    - x: 140
      y: 205
      type: file
    - x: 400
      y: 205
      type: link
      path: /Applications
win:
  target:
    - nsis
    - appx
  icon: build/icon.ico
appx:
  # identityName et publisher sont remplacés par les valeurs du Partner Center
  # (Microsoft Store > Gestion des produits > Identité du package)
  identityName: PLACEHOLDER.Flitdrop
  publisher: CN=PLACEHOLDER
  publisherDisplayName: Flitdrop
  backgroundColor: '#1b1b1b'
  languages:
    - fr-FR
    - en-US
nsis:
  oneClick: true
  perMachine: false
  deleteAppDataOnUninstall: false
  license: ''
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  # ajoute "clic-droit > Envoyer vers > Flitdrop" dans l'Explorateur Windows
  include: build/installer.nsh

appId: app.flitdrop.desktop
productName: Flitdrop
# version explicite : evite l'erreur "Cannot compute electron version" quand
# electron-builder n'introspecte pas le node_modules hoiste du workspace.
electronVersion: 33.2.1
# le coeur est bundle en un seul .cjs (aucune dependance runtime npm), donc on
# desactive l'etape d'install/rebuild d'electron-builder : dans un monorepo elle
# elague les devDependencies hoistees et se supprime elle-meme (app-builder-bin).
npmRebuild: false
buildDependenciesFromSource: false
# signe l'app macOS en ad-hoc pour qu'elle ne soit pas vue comme « endommagée »
afterPack: build/afterPack.cjs
directories:
  output: release
  buildResources: build
files:
  - main.cjs
  - updater.cjs
  - core/**
  - public/**
  - build/icon.png
  - build/icon.ico
  - build/tray.png
# serveur de mise a jour = les releases GitHub (electron-updater lit latest.yml).
# La presence de ce bloc fait generer latest.yml / latest-mac.yml par le build.
publish:
  provider: github
  owner: MrFrosas
  repo: flitdrop
# associe l'app à "Envoyer vers" et à "Ouvrir avec" pour tous les fichiers
fileAssociations:
  - ext: '*'
    name: Fichier
    role: Viewer
asar: true
mac:
  target:
    - dmg
  icon: build/icon.png
  category: public.app-category.utilities
  # non signe : suffisant pour tester et pour un lancement GitHub. Pour une
  # distribution large, ajouter la signature + notarisation Apple.
  identity: null
dmg:
  title: Flitdrop ${version}
  background: build/background.png
  iconSize: 92
  window:
    width: 540
    height: 380
  contents:
    - x: 140
      y: 205
      type: file
    - x: 400
      y: 205
      type: link
      path: /Applications
win:
  target:
    - nsis
    - appx
  icon: build/icon.ico
  # Signature Azure Trusted Signing (compte flitdrop-signing, profil flitdrop,
  # identité verifiee CC's Global). electron-builder signe le .exe PENDANT le
  # pack, donc avant le calcul du blockmap/latest.yml : l'auto-update reste
  # integre. Auth via les variables d'env AZURE_TENANT_ID / AZURE_CLIENT_ID /
  # AZURE_CLIENT_SECRET (fournies par les secrets GitHub dans release.yml). Le
  # timestamp ACS et FileDigest SHA256 sont appliques par defaut : indispensable
  # car les certificats Trusted Signing sont a duree de vie tres courte.
  azureSignOptions:
    endpoint: https://eus.codesigning.azure.net/
    codeSigningAccountName: flitdrop-signing
    certificateProfileName: flitdrop
appx:
  # identityName et publisher sont remplacés par les valeurs du Partner Center
  # (Microsoft Store > Gestion des produits > Identité du package)
  identityName: PLACEHOLDER.Flitdrop
  publisher: CN=PLACEHOLDER
  publisherDisplayName: Flitdrop
  backgroundColor: '#1b1b1b'
  languages:
    - fr-FR
    - en-US
nsis:
  # nom SANS espace : electron-builder ne met pas de guillemets autour du chemin
  # passe a Invoke-TrustedSigning, donc un espace dans le nom de l'installeur
  # casse la signature Azure (le nom est coupe au 1er espace -> "File not found").
  # (defaut = "Flitdrop Setup ${version}.exe", qui contenait un espace.)
  artifactName: ${productName}-Setup-${version}.${ext}
  oneClick: true
  perMachine: false
  deleteAppDataOnUninstall: false
  license: ''
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  # ajoute "clic-droit > Envoyer vers > Flitdrop" dans l'Explorateur Windows
  include: build/installer.nsh

name: Feature request
description: Suggest an idea or an improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Tell us the problem first, then what you have in mind.
  - type: textarea
    id: problem
    attributes:
      label: What is the problem?
      description: What are you trying to do that Flitdrop does not handle well today?
      placeholder: I often send the same file to two computers and have to pick each one by hand.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      description: Describe the feature or change you have in mind.
      placeholder: A way to send to several paired devices at once.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you have considered
      description: Other ways you have tried or thought about solving this.
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Mockups, examples from other apps, or extra context.
    validations:
      required: false

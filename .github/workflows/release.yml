name: release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            buildscript: 'dist:win:ci'
            artifact: 'apps/desktop/release/*.exe'
          - os: macos-latest
            buildscript: 'dist:mac'
            artifact: 'apps/desktop/release/*.dmg'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installer les dependances
        run: npm ci

      - name: Build du coeur
        run: npm run build -w @flitdrop/core

      - name: Tests
        run: npm test -w @flitdrop/core

      - name: Empaqueter l'installeur
        run: npm run ${{ matrix.buildscript }} -w @flitdrop/desktop

      - uses: actions/upload-artifact@v4
        with:
          name: flitdrop-${{ matrix.os }}
          path: ${{ matrix.artifact }}
          if-no-files-found: warn

      - name: Publier la release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          generate_release_notes: true
          body: |
            Flitdrop. L'AirDrop multi-OS, chiffre de bout en bout.

            - Windows : telechargez le `.exe`, double-cliquez. (SmartScreen affiche "editeur inconnu" : Informations complementaires > Executer quand meme.)
            - Mac : telechargez le `.dmg`, glissez Flitdrop dans Applications. Au 1er lancement, si macOS bloque : Reglages Systeme > Confidentialite et securite > Ouvrir quand meme, ou en Terminal `xattr -cr /Applications/Flitdrop.app`.

            Au premier lancement, scannez le QR code avec le telephone, et c'est appaire.

name: release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Le CI construit l'installeur Windows (.exe) et publie la release. Le .dmg
# macOS est construit et attache manuellement (appdmg ne compile pas sur le
# Node du runner ; il tourne de facon fiable en local). Voir docs/release.md.
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installer les dependances
        run: npm ci

      - name: Build du coeur
        run: npm run build -w @flitdrop/core

      - name: Typecheck
        run: npm run typecheck -w @flitdrop/core

      - name: Tests
        run: npm test -w @flitdrop/core

      - name: Empaqueter l'installeur Windows
        run: npm run dist:win:ci -w @flitdrop/desktop

      - uses: actions/upload-artifact@v4
        with:
          name: flitdrop-windows
          path: apps/desktop/release/*.exe
          if-no-files-found: warn

      - name: Publier la release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          # .exe + .blockmap + latest.yml : requis par l'auto-update (electron-updater)
          files: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest.yml
          generate_release_notes: true
          body: |
            Flitdrop. L'AirDrop multi-OS, chiffre de bout en bout.

            - Windows : telechargez le `.exe`, double-cliquez. (SmartScreen affiche "editeur inconnu" : Informations complementaires > Executer quand meme.)
            - Mac : telechargez le `.dmg`, glissez Flitdrop dans Applications. Au 1er lancement, si macOS bloque : Reglages Systeme > Confidentialite et securite > Ouvrir quand meme, ou en Terminal `xattr -cr /Applications/Flitdrop.app`.

            Au premier lancement, scannez le QR code avec le telephone, et c'est appaire.

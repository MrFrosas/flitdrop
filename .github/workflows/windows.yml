name: build-windows

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installer les dependances
        run: npm ci

      - name: Build du coeur
        run: npm run build -w @flitdrop/core

      - name: Tests
        run: npm test -w @flitdrop/core

      - name: Preparer l'app
        run: npm run prepare:app -w @flitdrop/desktop

      - name: Empaqueter l'installeur (NSIS)
        working-directory: apps/desktop
        run: npx electron-builder --win nsis --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: flitdrop-windows
          path: apps/desktop/release/*.exe
          if-no-files-found: warn

      # sur un tag v*, publie une release GitHub avec l'installeur telechargeable
      - name: Publier la release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/release/*.exe
          generate_release_notes: true
          body: |
            Flitdrop pour Windows. Telechargez le `.exe`, double-cliquez, c'est installe.
            Au premier lancement, un QR code a scanner avec le telephone, et c'est appaire.

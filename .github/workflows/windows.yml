name: build-windows

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installer les dependances
        run: npm ci

      - name: Build du coeur
        run: npm run build -w @flitdrop/core

      - name: Tests
        run: npm test -w @flitdrop/core

      - name: Empaqueter (NSIS + MSIX)
        run: npm run dist:win -w @flitdrop/desktop

      - uses: actions/upload-artifact@v4
        with:
          name: flitdrop-windows
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.appx
            apps/desktop/release/*.msix
          if-no-files-found: warn

      # sur un tag v*, publie une release GitHub avec l'installeur telechargeable
      - name: Publier la release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.appx
          generate_release_notes: true
          body: |
            Flitdrop pour Windows. Telechargez le `.exe`, double-cliquez, c'est installe.
            Le `.appx` est destine au Microsoft Store.
